services:
  face-hands:
    build: .
    container_name: face-hands-prod
    restart: unless-stopped
    environment:
      STREAM_URL: "${STREAM_URL:-http://192.168.110.150:81/stream}"
      TOLERANCE: "${TOLERANCE:-0.5}"
      MODEL: "${MODEL:-hog}"
      DATA_DIR: "/app/data"
      PORT: "8000"
      HOST: "0.0.0.0"
      FRAME_WIDTH: "${FRAME_WIDTH:-1280}"
      FRAME_HEIGHT: "${FRAME_HEIGHT:-720}"
      JPEG_QUALITY: "${JPEG_QUALITY:-80}"
    ports:
      - "${PUBLIC_PORT:-8012}:8000"
    volumes:
      - ./known_face:/app/known_face:ro
      - ./data:/app/data
    networks:
      - face-recognition-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  face-recognition-network:
    driver: bridge
